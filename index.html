<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain Grid // Creative Shader Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twgl.js/4.19.2/twgl-full.min.js"></script>
    <style>
        :root {
            --bg-primary: #08080b;
            --bg-sidebar: #0f0f14;
            --bg-control: #171722;
            --accent: #00ffaa;
            --accent-active: #ff0055;
            --text-main: #e2e2e9;
            --text-muted: #7c7c8c;
            --border: #222232;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Control Center Panel */
        .sidebar {
            width: 360px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .control-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .control-group {
            margin-bottom: 16px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .control-value {
            color: var(--text-main);
        }

        /* Dropdown Style */
        select {
            width: 100%;
            background: var(--bg-control);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            border-radius: 4px;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: var(--bg-control);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .color-picker-wrapper {
            background: var(--bg-control);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-wrapper input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            background: transparent;
        }

        .file-upload-btn {
            display: block;
            text-align: center;
            background: var(--bg-control);
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .file-upload-btn:hover {
            border-color: var(--accent);
            color: #fff;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.3);
        }

        .btn-record.recording {
            border-color: var(--accent-active);
            color: var(--accent-active);
            animation: pulse 1.5s infinite;
        }

        /* Screen Interactive Viewport Workspace */
        .main-workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 40px;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            border: 1px solid var(--border);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1 / 1; /* Locked perfectly square for artwork normalization */
            width: 550px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-workspace { height: 60vh; padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Grain Grid</h1>
                <p>GPU Material Processing Studio v3.0</p>
            </div>

            <div class="control-section">
                <div class="section-title">01 // Graphic Matrix Input</div>
                <label class="file-upload-btn" id="upload-label">
                    LOAD IMAGE LAYER
                    <input type="file" id="image-loader" accept="image/*">
                </label>
            </div>

            <div class="control-section">
                <div class="section-title">02 // Engine Texture Mode</div>
                <div class="control-group">
                    <select id="param-textureMode">
                        <option value="0">Film Grain & Fluid Noise</option>
                        <option value="1">Vintage Halftone Screen</option>
                        <option value="2">Xerox Photocopy Scan</option>
                        <option value="3">Coarse Ink Stamp Bleed</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">03 // Texture & Deformation</div>
                
                <div class="control-group">
                    <label>Grain Frequency <span class="control-value" id="val-grainFreq">3.0</span></label>
                    <input type="range" id="param-grainFreq" min="0.5" max="25.0" step="0.1" value="3.0">
                </div>

                <div class="control-group">
                    <label>Deform Intensity <span class="control-value" id="val-deform">1.0</span></label>
                    <input type="range" id="param-deform" min="0.0" max="5.0" step="0.1" value="1.0">
                </div>

                <div class="control-group">
                    <label>Imprint Scale <span class="control-value" id="val-radius">0.35</span></label>
                    <input type="range" id="param-radius" min="0.05" max="1.0" step="0.01" value="0.35">
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">04 // Quad-Chroma Ramp</div>
                <div class="color-grid">
                    <div class="color-picker-wrapper">
                        <input type="color" id="color1" value="#040406">
                        <span style="font-size:0.7rem;">Map A</span>
                    </div>
                    <div class="color-picker-wrapper">
                        <input type="color" id="color2" value="#120a21">
                        <span style="font-size:0.7rem;">Map B</span>
                    </div>
                    <div class="color-picker-wrapper">
                        <input type="color" id="color3" value="#00ffaa">
                        <span style="font-size:0.7rem;">Map C</span>
                    </div>
                    <div class="color-picker-wrapper">
                        <input type="color" id="color4" value="#ffffff">
                        <span style="font-size:0.7rem;">Map D</span>
                    </div>
                </div>
            </div>

            <div class="control-section" style="margin-top:auto; border-bottom:none;">
                <div class="section-title">05 // Terminal Output Exfiltration</div>
                <button class="btn" id="btn-snapshot">Capture High-Res 4K PNG</button>
                <button class="btn btn-record" id="btn-record">Start Video Recording</button>
            </div>
        </aside>

        <main class="main-workspace">
            <div class="canvas-wrapper">
                <canvas id="gl-canvas"></canvas>
            </div>
        </main>
    </div>

    <script>
        const vsSource = `#version 300 es
        in vec2 position;
        out vec2 v_uv;
        void main() {
            v_uv = position * 0.5 + 0.5;
            v_uv.y = 1.0 - v_uv.y; 
            gl_Position = vec4(position, 0.0, 1.0);
        }`;

        const fsSource = `#version 300 es
        precision highp float;
        in vec2 v_uv;
        out vec4 fragColor;

        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        uniform float u_time;
        uniform sampler2D u_texture;
        
        uniform int u_textureMode;
        uniform float u_grainFreq;
        uniform float u_deform;
        uniform float u_radius;
        
        uniform vec3 u_color1;
        uniform vec3 u_color2;
        uniform vec3 u_color3;
        uniform vec3 u_color4;

        float hash21(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash21(i + vec2(0.0,0.0)), hash21(i + vec2(1.0,0.0)), u.x),
                       mix(hash21(i + vec2(0.0,1.0)), hash21(i + vec2(1.0,1.0)), u.x), u.y);
        }

        float fbm(vec2 p) {
            float v = 0.0; float am = 0.5;
            for (int i = 0; i < 4; i++) {
                v += noise(p) * am; p *= 2.0; am *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 normMouse = u_mouse;
            float mouseDist = distance(v_uv, normMouse);
            float interactiveImprint = smoothstep(u_radius, 0.0, mouseDist);
            
            // Real-time multi-octave coordinates deformation 
            vec2 deformUV = v_uv;
            float nX = fbm(v_uv * 4.0 + vec2(u_time * 0.2));
            float nY = fbm(v_uv * 4.0 - vec2(u_time * 0.2));
            deformUV += vec2(nX - 0.5, nY - 0.5) * (u_deform * 0.03 + interactiveImprint * 0.08);
            deformUV = clamp(deformUV, 0.0, 1.0);

            vec4 texColor = texture(u_texture, deformUV);
            float luminance = dot(texColor.rgb, vec3(0.299, 0.587, 0.114));

            // Output Value Modifiers Matrix Architecture
            float calculatedValue = luminance;

            if (u_textureMode == 0) {
                // --- ENGINE 01: Film Grain & Fluid Noise ---
                float grain = hash21(v_uv * u_grainFreq * 200.0 + vec2(u_time * 0.01));
                calculatedValue = mix(luminance, grain, 0.18);
            } 
            else if (u_textureMode == 1) {
                // --- ENGINE 02: Vintage Halftone Screen ---
                vec2 halftonePos = gl_FragCoord.xy * (u_grainFreq * 0.03);
                float dotMatrix = sin(halftonePos.x) * sin(halftonePos.y) * 0.5 + 0.5;
                calculatedValue = smoothstep(0.4, 0.6, luminance * dotMatrix * 1.5);
            } 
            else if (u_textureMode == 2) {
                // --- ENGINE 03: Xerox Photocopy Scan ---
                float scanline = sin(v_uv.y * u_grainFreq * 50.0 + u_time) * 0.1;
                float microGrit = hash21(v_uv * 800.0) * 0.25;
                float rawPhotocopy = luminance + scanline + microGrit;
                calculatedValue = smoothstep(0.35, 0.65, rawPhotocopy);
            } 
            else if (u_textureMode == 3) {
                // --- ENGINE 04: Coarse Ink Stamp Bleed ---
                float stampNoise = fbm(v_uv * u_grainFreq * 5.0) * 0.35;
                float totalBleed = luminance + stampNoise - (interactiveImprint * 0.15);
                calculatedValue = smoothstep(0.45, 0.55, totalBleed);
            }

            calculatedValue = clamp(calculatedValue, 0.0, 1.0);

            // Quad-Chroma Gradient System Matrix Pipeline Mapping
            vec3 finalRampColor;
            if(calculatedValue < 0.33) {
                finalRampColor = mix(u_color1, u_color2, smoothstep(0.0, 0.33, calculatedValue));
            } else if(calculatedValue < 0.66) {
                finalRampColor = mix(u_color2, u_color3, smoothstep(0.33, 0.66, calculatedValue));
            } else {
                finalRampColor = mix(u_color3, u_color4, smoothstep(0.66, 1.0, calculatedValue));
            }

            // Injected active highlights feedback based on user location maps
            finalRampColor = mix(finalRampColor, u_color4 * 1.15, interactiveImprint * 0.12);

            fragColor = vec4(finalRampColor, 1.0);
        }
        `;
    </script>

    <script>
        const canvas = document.getElementById("gl-canvas");
        const gl = canvas.getContext("webgl2", { preserveDrawingBuffer: true });

        if (!gl) alert("WebGL2 engine mapping failed.");

        const programInfo = twgl.createProgramInfo(gl, [vsSource, fsSource]);
        const bufferInfo = twgl.createBufferInfoFromArrays(gl, {
            position: [-1, -1, 0, 1, -1, 0, -1, 1, 0, -1, 1, 0, 1, -1, 0, 1, 1, 0],
        });

        // Application Global Pipeline Parameters
        let mousePos = [0.5, 0.5];
        let targetMousePos = [0.5, 0.5];
        let currentTexture;
        let recordingState = false;
        let mediaRecorder;
        let videoChunks = [];

        // UI Target Configurations Hooking Elements
        const uiTextureMode = document.getElementById('param-textureMode');
        const uiGrainFreq = document.getElementById('param-grainFreq');
        const uiDeform = document.getElementById('param-deform');
        const uiRadius = document.getElementById('param-radius');
        const uiColor1 = document.getElementById('color1');
        const uiColor2 = document.getElementById('color2');
        const uiColor3 = document.getElementById('color3');
        const uiColor4 = document.getElementById('color4');

        function hexToRgb(hex) {
            return [
                parseInt(hex.slice(1, 3), 16) / 255,
                parseInt(hex.slice(3, 5), 16) / 255,
                parseInt(hex.slice(5, 7), 16) / 255
            ];
        }

        // Generate Procedural High-Contrast Industrial Grid Base Texture Layout
        function createDefaultTexture() {
            const size = 1000;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size; tempCanvas.height = size;
            const ctx = tempCanvas.getContext('2d');

            ctx.fillStyle = '#0a0a12'; ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(500, 500, 300, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#0a0a12'; ctx.beginPath(); ctx.rect(320, 320, 360, 360); ctx.fill();
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(500, 500, 120, 0, Math.PI * 2); ctx.fill();

            return twgl.createTexture(gl, { src: tempCanvas, min: gl.LINEAR, mag: gl.LINEAR, wrap: gl.CLAMP_TO_EDGE });
        }

        currentTexture = createDefaultTexture();

        function resizeCanvas(forcedWidth = null, forcedHeight = null) {
            const w = forcedWidth || canvas.clientWidth;
            const h = forcedHeight || canvas.clientHeight;
            if (canvas.width !== w || canvas.height !== h) {
                canvas.width = w; canvas.height = h;
                gl.viewport(0, 0, w, h);
            }
        }

        // Active Event System Tracking Listeners Loop
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetMousePos[0] = (e.clientX - rect.left) / rect.width;
            targetMousePos[1] = (e.clientY - rect.top) / rect.height;
        });

        canvas.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                targetMousePos[0] = (e.touches[0].clientX - rect.left) / rect.width;
                targetMousePos[1] = (e.touches[0].clientY - rect.top) / rect.height;
            }
        }, { passive: true });

        // Local Image Loader Matrix File System Pipeline Integration
        document.getElementById('image-loader').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    gl.deleteTexture(currentTexture);
                    currentTexture = twgl.createTexture(gl, { src: img, min: gl.LINEAR, mag: gl.LINEAR, wrap: gl.CLAMP_TO_EDGE });
                    document.getElementById('upload-label').innerText = "LAYER TRANSLATED";
                    document.getElementById('upload-label').style.borderColor = "var(--accent)";
                };
                img.src = event.target.result;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // Synchronize display text value labels dynamically on execution cycles
        const numericSliders = [uiGrainFreq, uiDeform, uiRadius];
        numericSliders.forEach(slider => {
            slider.addEventListener('input', (e) => {
                document.getElementById(`val-${e.target.id.replace('param-', '')}`).innerText = parseFloat(e.target.value).toFixed(1);
            });
        });

        // Core Shader Frame Render Pipeline Execution Matrix Loop
        function drawFrame(time) {
            // Coordinate tracking vector physics smoothing
            mousePos[0] += (targetMousePos[0] - mousePos[0]) * 0.1;
            mousePos[1] += (targetMousePos[1] - mousePos[1]) * 0.1;

            const uniforms = {
                u_resolution: [canvas.width, canvas.height],
                u_mouse: mousePos,
                u_time: time * 0.001,
                u_texture: currentTexture,
                u_textureMode: parseInt(uiTextureMode.value),
                u_grainFreq: parseFloat(uiGrainFreq.value),
                u_deform: parseFloat(uiDeform.value),
                u_radius: parseFloat(uiRadius.value),
                u_color1: hexToRgb(uiColor1.value),
                u_color2: hexToRgb(uiColor2.value),
                u_color3: hexToRgb(uiColor3.value),
                u_color4: hexToRgb(uiColor4.value)
            };

            gl.useProgram(programInfo.program);
            twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
            twgl.setUniforms(programInfo, uniforms);
            twgl.drawBufferInfo(gl, bufferInfo);
        }

        function renderLoop(time) {
            if (!recordingState && canvas.width !== canvas.clientWidth) {
                resizeCanvas(); // Standard responsive dynamic checks window sizing mapping bounds profiles
            }
            drawFrame(time);
            requestAnimationFrame(renderLoop);
        }

        // Initialize Runtime Loops Engines
        resizeCanvas();
        requestAnimationFrame(renderLoop);

        // --- EXPORT PIPELINE 01: High-Res 4K Snapshot Engine ---
        document.getElementById('btn-snapshot').addEventListener('click', () => {
            const originalWidth = canvas.clientWidth;
            const originalHeight = canvas.clientHeight;

            // Instantly push GPU pipeline viewport to a crisp 4K 3840x3840 square aspect configuration matrix boundary
            resizeCanvas(3840, 3840);
            
            // Draw a single frame synchronously at the target high-res format size limits
            drawFrame(performance.now());

            // Extract the pristine full fidelity raster array contents straight from hardware back buffers
            const dataURL = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `grain-grid-4k-export-${Date.now()}.png`;
            link.href = dataURL;
            link.click();

            // Re-establish original responsive window layout parameters smoothly
            resizeCanvas(originalWidth, originalHeight);
            drawFrame(performance.now());
        });

        // --- EXPORT PIPELINE 02: Media Stream Real-Time Video Capturing Terminal System ---
        const recordBtn = document.getElementById('btn-record');
        recordBtn.addEventListener('click', () => {
            if (!recordingState) {
                const stream = canvas.captureStream(60);
                let options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm;codecs=vp8' };

                videoChunks = [];
                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) videoChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(videoChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `grain-grid-capture-${Date.now()}.webm`;
                    link.href = url; link.click(); URL.revokeObjectURL(url);
                };

                mediaRecorder.start();
                recordingState = true;
                recordBtn.innerText = "STOP & SAVE WEBM";
                recordBtn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                recordingState = false;
                recordBtn.innerText = "START VIDEO RECORDING";
                recordBtn.classList.remove('recording');
            }
        });
    </script>
</body>
</html>
